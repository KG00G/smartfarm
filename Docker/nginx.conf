server {
    listen 80;
    # เปลี่ยนจาก localhost เป็น _ (ขีดล่าง) เพื่อให้รับ Traffic จากทุกชื่อ (รวมถึง Cloudflare)
    server_name _; 

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # เปลี่ยนจาก backend เป็น greenspace_backend ให้ตรงตามชื่อ service ใน docker-compose
        proxy_pass http://greenspace_backend:3000/api/; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}